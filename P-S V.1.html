<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placenta Shield - Realidad Aumentada</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #F8FAFC; /* Blanco Roto del tríptico */
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilo del visor 3D */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #F8FAFC;
            --poster-color: transparent;
        }

        /* Botón de Realidad Aumentada (Flotante) */
        .ar-button {
            background-color: #001A3D; /* Azul Marino */
            color: #00E5FF; /* Cian Eléctrico */
            border: 2px solid #00E5FF;
            border-radius: 30px;
            padding: 15px 30px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ar-button:active {
            background-color: #00E5FF;
            color: #001A3D;
        }

        /* Pantalla de carga */
        #loading-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Montserrat', sans-serif;
            color: #001A3D;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
        }

        /* Ocultar barra de progreso por defecto de model-viewer */
        .progress-bar { display: none; }
    </style>
</head>
<body>

    <model-viewer 
        src="placenta_shield.glb" 
        alt="Modelo 3D del Sistema Placenta Shield"
        auto-rotate 
        camera-controls 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        environment-image="neutral" 
        shadow-intensity="1">
        
        <div id="loading-screen" slot="poster">
            Cargando Sistema<br><span style="color: #00E5FF; font-size: 24px;">Placenta Shield...</span>
        </div>

        <button slot="ar-button" class="ar-button">
            VER EN REALIDAD AUMENTADA
        </button>
        
    </model-viewer>

</body>
</html>
